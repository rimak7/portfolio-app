name: My first pipeline
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4 
      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app:${{ github.run_number }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest .
      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
     
      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app:${{ github.run_number }}    
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest    

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: ssh to linux and deploy
        uses: appleboy/ssh-action@v1
        with:
         host: ${{ secrets.HOST }}
         username: ${{ secrets.USERNAME }}
         key: ${{ secrets.KEY }}
        #  port: ${{ secrets.PORT }}
         script: |
              docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest
              docker stop portfolio-app || true
              docker rm -f portfolio-app || echo "No container to remove"
              docker run -d -p 80:80 --name portfolio-app ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest